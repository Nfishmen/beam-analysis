<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梁结构受力分析系统</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2d3436;
            --muted: #636e72;
            --accent: #0984e3;
            --border: #dfe6e9;
            --shadow: 0 2px 12px rgba(0,0,0,.08);
            --radius: 12px;
            --danger: #d63031;
            --success: #00b894;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #2d3436 0%, #434a54 100%);
            color: white;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .5px;
        }
        .header .dot { color: #fdcb6e; }

        /* Layout */
        .container { max-width: 1300px; margin: 0 auto; padding: 24px 20px; }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            background: var(--card);
            margin-bottom: 20px;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: #eef5ff;
        }
        .upload-zone .icon { font-size: 48px; margin-bottom: 8px; }
        .upload-zone p { color: var(--muted); margin: 4px 0; }
        .upload-zone .hint { font-size: .82rem; }
        #fileInput { display: none; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #0773c5; }
        .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
        .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }

        /* Status */
        .status { margin-bottom: 16px; min-height: 24px; font-size: .9rem; }
        .status.error { color: var(--danger); }
        .status.info { color: var(--accent); }
        .mode-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
            margin-left: 6px;
        }
        .mode-yolo { background: #d5f5e3; color: #1e8449; }
        .mode-demo { background: #fdebd0; color: #b9770e; }

        /* Results grid */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 860px) { .results-grid { grid-template-columns: 1fr; } }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            font-weight: 700;
            padding: 12px 18px;
            background: #f8f9fc;
            border-bottom: 1px solid var(--border);
            font-size: .92rem;
        }
        .card-body { padding: 16px 18px; }

        /* Stats */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f1f2f6;
            font-size: .9rem;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-val { font-weight: 700; color: var(--accent); }

        /* Charts */
        .charts-section { margin-top: 20px; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 12px;
        }
        .chart-card img {
            width: 100%;
            height: auto;
            border-bottom-left-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2.5px solid #ccc;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        /* Preview */
        .preview-img {
            max-width: 100%;
            max-height: 320px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        /* Detections table */
        .det-table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: 8px; }
        .det-table th, .det-table td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        .det-table th { color: var(--muted); font-weight: 600; }
    </style>
</head>
<body>

<div class="header">
    <span>🏗️</span> 梁结构受力分析系统
    <span class="dot">·</span>
    <span style="font-size:.8rem;font-weight:400;opacity:.7;">基于 YOLO 的自动识别与力学计算</span>
</div>

<div class="container">

    <!-- Upload area -->
    <div class="upload-zone" id="dropZone">
        <div class="icon">📁</div>
        <p><strong>拖拽梁结构图片到此处</strong></p>
        <p class="hint">或点击此处选择文件 · 支持 JPG / PNG / BMP</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <!-- Buttons -->
    <div class="btn-row">
        <button class="btn btn-primary" id="btnAnalyze" disabled>
            ⚡ 开始分析
        </button>
        <button class="btn btn-ghost" id="btnClear">清空</button>
        <span class="status" id="status"></span>
    </div>

    <!-- Results container (hidden initially) -->
    <div id="resultsContainer" class="hidden">
        <div class="results-grid">
            <!-- Image preview -->
            <div class="card">
                <div class="card-header">📷 上传图片 <span id="modeBadge"></span></div>
                <div class="card-body">
                    <img id="previewImg" class="preview-img" alt="Uploaded beam">
                </div>
            </div>

            <!-- Analysis data -->
            <div class="card">
                <div class="card-header">📊 分析结果</div>
                <div class="card-body" id="statsBody"></div>
            </div>
        </div>

        <!-- Detections (YOLO mode only) -->
        <div id="detectionsCard" class="card hidden" style="margin-top:20px;">
            <div class="card-header">🔍 YOLO 检测结果</div>
            <div class="card-body" id="detectionsBody"></div>
        </div>

        <!-- Charts -->
        <div class="charts-section">
            <h3 style="margin-bottom:6px;">📈 力学图表</h3>
            <div class="charts-grid" id="chartsGrid"></div>
        </div>
    </div>

</div>

<script>
// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const btnAnalyze = document.getElementById('btnAnalyze');
const btnClear   = document.getElementById('btnClear');
const statusEl   = document.getElementById('status');
const resultsCon = document.getElementById('resultsContainer');
const previewImg = document.getElementById('previewImg');
const modeBadge  = document.getElementById('modeBadge');
const statsBody  = document.getElementById('statsBody');
const chartsGrid = document.getElementById('chartsGrid');
const detCard    = document.getElementById('detectionsCard');
const detBody    = document.getElementById('detectionsBody');

let selectedFile = null;

// ---------------------------------------------------------------------------
// File selection
// ---------------------------------------------------------------------------
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
});

function setFile(file) {
    selectedFile = file;
    dropZone.querySelector('.icon').textContent = '✅';
    dropZone.querySelector('strong').textContent = file.name;
    dropZone.querySelector('.hint').textContent = `${(file.size / 1024).toFixed(1)} KB`;
    btnAnalyze.disabled = false;
    statusEl.textContent = '';
    statusEl.className = 'status';
}

btnClear.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    dropZone.querySelector('.icon').textContent = '📁';
    dropZone.querySelector('strong').textContent = '拖拽梁结构图片到此处';
    dropZone.querySelector('.hint').textContent = '或点击此处选择文件 · 支持 JPG / PNG / BMP';
    btnAnalyze.disabled = true;
    resultsCon.classList.add('hidden');
    statusEl.textContent = '';
    statusEl.className = 'status';
});

// ---------------------------------------------------------------------------
// Analyze
// ---------------------------------------------------------------------------
btnAnalyze.addEventListener('click', async () => {
    if (!selectedFile) return;

    btnAnalyze.disabled = true;
    btnAnalyze.innerHTML = '<span class="spinner"></span> 分析中...';
    statusEl.textContent = '正在处理，请稍候...';
    statusEl.className = 'status info';

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
        const resp = await fetch('/upload', { method: 'POST', body: formData });
        const data = await resp.json();

        if (!data.success) {
            statusEl.textContent = '❌ ' + (data.error || 'Unknown error');
            statusEl.className = 'status error';
            return;
        }

        renderResults(data);
        statusEl.textContent = '✅ 分析完成';
        statusEl.className = 'status info';
    } catch (err) {
        statusEl.textContent = '❌ 网络错误: ' + err.message;
        statusEl.className = 'status error';
    } finally {
        btnAnalyze.disabled = false;
        btnAnalyze.innerHTML = '⚡ 开始分析';
    }
});

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderResults(data) {
    resultsCon.classList.remove('hidden');
    const r = data.results;

    // Preview image
    previewImg.src = data.original_image;

    // Mode badge
    if (data.mode === 'yolo') {
        modeBadge.innerHTML = '<span class="mode-badge mode-yolo">YOLO 检测</span>';
    } else {
        modeBadge.innerHTML = '<span class="mode-badge mode-demo">Demo 演示</span>';
    }

    // Stats
    const deflectionMm = (r.max_deflection * 1000).toFixed(2);
    const stressMpa = (r.max_stress / 1e6).toFixed(1);
    const momentKNm = (r.max_moment / 1000).toFixed(2);

    // Reactions string
    let reactionsHtml = '';
    for (const [key, val] of Object.entries(r.reactions)) {
        reactionsHtml += `<div class="stat-row"><span>支座 ${key}</span><span class="stat-val">${val.Ry?.toFixed(1) ?? '—'} N</span></div>`;
    }

    statsBody.innerHTML = `
        <div class="stat-row"><span>梁长</span><span class="stat-val">${r.length} m</span></div>
        <div class="stat-row"><span>梁类型</span><span class="stat-val">${r.beam_type}</span></div>
        ${reactionsHtml}
        <div class="stat-row"><span>最大剪力 V<sub>max</sub></span><span class="stat-val">${r.max_shear.toFixed(1)} N</span></div>
        <div class="stat-row"><span>最大弯矩 M<sub>max</sub></span><span class="stat-val">${momentKNm} kN·m</span></div>
        <div class="stat-row"><span>最大挠度 v<sub>max</sub></span><span class="stat-val">${deflectionMm} mm</span></div>
        <div class="stat-row"><span>最大弯曲应力 σ<sub>max</sub></span><span class="stat-val">${stressMpa} MPa</span></div>
    `;

    // Charts
    chartsGrid.innerHTML = '';
    const chartLabels = {
        report: '综合报告 (SFD / BMD / 挠度 / 应力)',
        stress: '截面应力分布',
        detection_overlay: 'YOLO 检测标注',
    };
    for (const [key, url] of Object.entries(data.charts)) {
        const label = chartLabels[key] || key;
        chartsGrid.innerHTML += `
            <div class="card chart-card">
                <div class="card-header">${label}</div>
                <img src="${url}" alt="${label}" loading="lazy">
            </div>`;
    }

    // Detections table (YOLO only)
    if (data.mode === 'yolo' && data.detections.length) {
        detCard.classList.remove('hidden');
        let rows = '';
        data.detections.forEach(d => {
            const bbox = d.bbox.map(v => v.toFixed(0)).join(', ');
            rows += `<tr>
                <td>${d.class_name}</td>
                <td>${(d.confidence * 100).toFixed(1)}%</td>
                <td>[${bbox}]</td>
                <td>(${d.center[0].toFixed(0)}, ${d.center[1].toFixed(0)})</td>
            </tr>`;
        });
        detBody.innerHTML = `
            <table class="det-table">
                <thead><tr><th>类别</th><th>置信度</th><th>BBox</th><th>中心</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
    } else {
        detCard.classList.add('hidden');
    }
}
</script>

</body>
</html>
